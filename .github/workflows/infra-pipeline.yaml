name: Infrastructure Pipeline (Terraform)

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"         # only trigger when terraform/ changes
      - ".github/workflows/infra-pipeline.yaml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "eu-central-1"
  TF_WORKING_DIR: "./terraform"

jobs:
  # ── Job 1: Plan (runs on every PR and push) ────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write      # needed to post plan as PR comment

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Disable wrapper to preserve terraform's exit codes (0=no changes, 1=error, 2=changes)
          # The wrapper resets exit codes to 0, breaking our apply job condition
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        # Fails the pipeline if any .tf file is not properly formatted.
        # Run 'terraform fmt' locally before pushing to fix.

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        # Exit code: 0 = no changes, 1 = error, 2 = changes present
        shell: bash
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -out=tfplan > plan-output.txt 2>&1
          TF_EXIT=$?
          cat plan-output.txt
          echo "exit_code=$TF_EXIT" >> $GITHUB_OUTPUT
          echo "Terraform exit code: $TF_EXIT"
        continue-on-error: true   # exit code 2 is not an error

      - name: Fail on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

      # Post the plan output as a comment on the PR for review
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(
              '${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8'
            );
            // Truncate very long plans to fit GitHub comment limit
            const maxLen = 60000;
            const body = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n...(truncated)'
              : plan;

            // Find and update existing plan comment if present
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.startsWith('## Terraform Plan')
            );
            const commentBody = `## Terraform Plan\n\`\`\`\n${body}\n\`\`\``;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: commentBody,
              });
            }

      # Save the plan file so the apply job can use it
      # Ensures apply runs exactly what was planned, not a new plan
      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ── Job 2: Apply (only on main, requires manual approval) ─────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    # Only run on push to main (not on PRs), and only if there are changes
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.plan.outputs.plan_exit_code == '2'

    # This is the manual approval gate.
    # Go to: Settings → Environments → production → Required reviewers
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false  # Must match plan job setting

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        # Apply using the exact plan that was reviewed — not a fresh plan
        run: terraform apply -auto-approve tfplan