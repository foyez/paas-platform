name: Destroy Kubernetes Resources

# Manual trigger only - prevents accidental destruction
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm k8s resource destruction'
        required: true
        type: string

env:
  AWS_REGION: "eu-central-1"
  CLUSTER_NAME: "paas-cluster"

jobs:
  destroy:
    name: kubectl delete
    runs-on: ubuntu-latest
    # Double safety: input confirmation + environment approval
    if: github.event.inputs.confirm == 'destroy'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      # Step 1: Delete ArgoCD apps first (prevents self-healing)
      - name: Delete ArgoCD Applications
        run: |
          echo "Deleting ArgoCD root app (cascades to all child apps)..."
          kubectl delete application root -n argocd --ignore-not-found
          
          # Wait for child apps to be deleted
          echo "Waiting for ArgoCD apps to be deleted..."
          for i in $(seq 1 30); do
            APPS=$(kubectl get applications -n argocd --no-headers 2>/dev/null | wc -l)
            if [ "$APPS" -eq 0 ]; then
              echo "✓ All ArgoCD apps deleted"
              break
            fi
            echo "  Waiting... ($APPS apps remaining)"
            [ $i -eq 30 ] && echo "⚠ Timeout waiting for apps to delete"
            sleep 5
          done

      # Step 2: Delete resources (order matters)

      - name: Delete CNPG clusters (databases)
        run: |
          echo "Deleting CNPG clusters..."
          kubectl delete -f k8s/cnpg/ --recursive --ignore-not-found
          # Wait for pods to terminate
          kubectl wait --for=delete pods -l cnpg.io/cluster -n paas-databases --timeout=120s || true

      - name: Delete CloudNativePG operator
        run: |
          echo "Deleting CNPG operator..."
          kubectl delete -f k8s/cnpg-operator/ --recursive --ignore-not-found

      - name: Delete base infrastructure
        run: |
          echo "Deleting namespaces and storage class..."
          kubectl delete -f k8s/base-infra/ --recursive --ignore-not-found

      - name: Delete ArgoCD (optional - remove if you want to keep ArgoCD)
        run: |
          echo "Deleting ArgoCD..."
          kubectl delete namespace argocd --ignore-not-found

      - name: Verify cleanup
        run: |
          echo "Remaining resources:"
          kubectl get all -n paas-databases 2>/dev/null || echo "✓ Namespace paas-databases deleted"
          kubectl get all -n cnpg-system 2>/dev/null || echo "✓ Namespace cnpg-system deleted"
          kubectl get all -n argocd 2>/dev/null || echo "✓ Namespace argocd deleted"
