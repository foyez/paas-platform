apiVersion: v1
kind: Secret
metadata:
  name: ha-db-app-secret
  namespace: paas-databases
type: kubernetes.io/basic-auth
stringData:
  username: app
  password: ha-changeme-in-production
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ha-db
  namespace: paas-databases
spec:
  instances: 3 # 1 primary + 2 replicas

  imageName: ghcr.io/cloudnative-pg/postgresql:15.6

  storage:
    size: 2Gi
    storageClass: gp3

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: ha-db-app-secret

  # Spread pods across AZs for true HA
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          cnpg.io/cluster: ha-db

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"